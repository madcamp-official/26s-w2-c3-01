server:
  port: ${SERVER_PORT:8080}
spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: melody-bubble-server
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/melody_bubble}
    username: ${POSTGRES_USER:melody}
    password: ${POSTGRES_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
app:
  google:
    # 공개 식별자인 개발 OAuth client ID. 운영에서는 compose가 환경변수를 필수로 요구합니다.
    web-client-id: ${GOOGLE_WEB_CLIENT_ID:170698756702-dactjs85sco3reamftdjjt2brvd396cn.apps.googleusercontent.com}
  seed-demo: ${DEMO_SEED_ENABLED:true}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5.4}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MUSIC_MODEL:lyria-3-clip-preview}
  ops:
    username: ${OPS_USERNAME:ops}
    password: ${OPS_PASSWORD:local-ops-password-change-me}
  jwt:
    # 최소 32바이트. 로컬 개발에서도 .env 또는 환경변수로만 제공합니다.
    secret: ${JWT_SECRET:}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
  nearby:
    presence-ttl-seconds: 90
    max-radius-meters: 2000
  realtime:
    broker-relay:
      enabled: ${WEBSOCKET_BROKER_RELAY_ENABLED:false}
      host: ${WEBSOCKET_BROKER_RELAY_HOST:localhost}
      port: ${WEBSOCKET_BROKER_RELAY_PORT:61613}
      login: ${WEBSOCKET_BROKER_RELAY_LOGIN:guest}
      passcode: ${WEBSOCKET_BROKER_RELAY_PASSCODE:guest}
      virtual-host: ${WEBSOCKET_BROKER_RELAY_VIRTUAL_HOST:/}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
management:
  endpoints:
    web:
      exposure:
        include: health,info
