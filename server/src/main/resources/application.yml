server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: melody-bubble-server
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/melody_bubble}
    username: ${POSTGRES_USER:melody}
    password: ${POSTGRES_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
app:
  seed-demo: ${DEMO_SEED_ENABLED:true}
  jwt:
    # 최소 32바이트. 로컬 개발에서도 .env 또는 환경변수로만 제공합니다.
    secret: ${JWT_SECRET:}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}
  nearby:
    presence-ttl-seconds: 90
    radius-meters: 300
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
management:
  endpoints:
    web:
      exposure:
        include: health,info
