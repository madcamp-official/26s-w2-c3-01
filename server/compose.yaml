services:
  postgres:
    image: postgis/postgis:16-3.5
    # 공식 이미지가 현재 amd64만 제공하므로 Apple Silicon에서는 Docker Desktop의 emulation을 사용합니다.
    platform: linux/amd64
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-melody_bubble}
      POSTGRES_USER: ${POSTGRES_USER:-melody}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes: [postgres_data:/var/lib/postgresql/data]
  rabbitmq:
    image: rabbitmq:4.1-management
    command: ["sh", "-c", "rabbitmq-plugins enable --offline rabbitmq_stomp && rabbitmq-server"]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-melody}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
    ports: ["5672:5672", "61613:61613", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
volumes:
  postgres_data:
