name: Test, build, and deploy

on:
  push:
    branches:
      - test
  workflow_dispatch:

concurrency:
  group: test-deployment
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  android:
    name: Android checks and APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Test, lint, and build Android
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: melody-bubble-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

  server:
    name: Server checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Test server
        working-directory: server
        run: ../gradlew test

  deploy:
    name: Deploy server to AWS
    needs: [android, server]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:test-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Update ECS Express service
        env:
          IMAGE: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
        run: |
          jq --arg image "$IMAGE" '.primaryContainer.image = $image' \
            server/deploy/ecs-express-service.json > /tmp/ecs-deploy.json
          aws ecs update-express-gateway-service \
            --cli-input-json file:///tmp/ecs-deploy.json
      - name: Wait for ECS deployment
        run: |
          sleep 5
          deployment_arn="$(aws ecs list-service-deployments \
            --service "${{ vars.ECS_SERVICE_ARN }}" \
            --max-results 1 \
            --query 'serviceDeployments[0].serviceDeploymentArn' \
            --output text)"
          echo "Monitoring $deployment_arn"
          for attempt in $(seq 1 80); do
            status="$(aws ecs describe-service-deployments \
              --service-deployment-arns "$deployment_arn" \
              --query 'serviceDeployments[0].status' \
              --output text)"
            echo "Attempt $attempt: $status"
            case "$status" in
              SUCCESSFUL) exit 0 ;;
              FAILED|ROLLBACK_FAILED|ROLLBACK_SUCCESSFUL) exit 1 ;;
            esac
            sleep 15
          done
          echo "Deployment did not finish within 20 minutes" >&2
          exit 1
      - name: Verify public health endpoint
        run: |
          curl --fail --show-error \
            --retry 12 --retry-delay 10 --retry-all-errors \
            "${{ vars.SERVER_URL }}/actuator/health"
